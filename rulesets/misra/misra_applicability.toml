# rulesets/misra/misra_applicability.toml

[mapping]
schema_version = "0.3"
misra_source = "MISRA C:2025 Addendum 6 (Applicability to Rust)"
last_updated = "2026-02-26"
notes = """
This file defines explicit traceability metadata for HA-RUST rules relative to MISRA.

Traceability kinds:
- misra_mapped: The rule maps to one or more specific MISRA items validated against the licensed source.
- misra_aligned: The rule supports MISRA goals/intent but does not claim a specific MISRA ID mapping.
- tool_native: The rule is outside MISRA scope (e.g., supply chain policy) and should not appear in MISRA summaries.

IMPORTANT:
- This file does not reproduce MISRA content.
- misra_refs MUST be empty unless traceability_kind = "misra_mapped".
- misra_category MUST be "n_a" unless traceability_kind = "misra_mapped".

Rules may be classified as MISRA-mapped, MISRA-aligned, or tool-native; 
only MISRA-mapped rules contribute to MISRA compliance summaries.

CWE mappings are maintained separately and may be added later; 
absence of CWE data does not imply lack of security relevance.
"""

